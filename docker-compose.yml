services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    command: ["python", "manage.py", "migrate", "--noinput"]
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  bootstrap-admin:
    build: .
    command: ["python", "manage.py", "create_users"]
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      TICKETSYSTEM_USERNAME: ${TICKETSYSTEM_USERNAME}
      TICKETSYSTEM_PASSWORD: ${TICKETSYSTEM_PASSWORD}
      TICKETSYSTEM_EMAIL: ${TICKETSYSTEM_EMAIL}
      TICKETSYSTEM_ROLE: ${TICKETSYSTEM_ROLE}
      TICKETSYSTEM_FIRST_NAME: ${TICKETSYSTEM_FIRST_NAME}
      TICKETSYSTEM_LAST_NAME: ${TICKETSYSTEM_LAST_NAME}
      TICKETSYSTEM_SUPE_FLAG: ${TICKETSYSTEM_SUPE_FLAG}
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

  instance1:
    build: .
    restart: unless-stopped
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,instance1,${CODESPACE_NAME}-8000.${GITHUB_CODESPACES_PORT_FORWARDING_DOMAIN}"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    ports:
      - "8000:8000"
    depends_on:
      bootstrap-admin:
        condition: service_completed_successfully

volumes:
  pgdata:
