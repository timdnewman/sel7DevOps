{% load bootstrap5 %}
<!DOCTYPE html>
<html lang="en">
<head>
    <title>{% block title %}Ticket System{% endblock %}</title>
    {% bootstrap_css %}
</head>
<body>
  <main class="container">
    {% if messages %}
      {% bootstrap_messages %}
    {% endif %}
    {% block content %}{% endblock %}
  </main>

  {% bootstrap_javascript %}
</body>
</html>
