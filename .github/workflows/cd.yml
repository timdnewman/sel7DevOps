name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write deploy.env on the runner
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          TICKETSYSTEM_USERNAME: ${{ secrets.TICKETSYSTEM_USERNAME }}
          TICKETSYSTEM_EMAIL: ${{ secrets.TICKETSYSTEM_EMAIL }}
          TICKETSYSTEM_PASSWORD: ${{ secrets.TICKETSYSTEM_PASSWORD }}
          TICKETSYSTEM_FIRST_NAME: ${{ secrets.TICKETSYSTEM_FIRST_NAME }}
          TICKETSYSTEM_LAST_NAME: ${{ secrets.TICKETSYSTEM_LAST_NAME }}
          TICKETSYSTEM_ROLE: ${{ secrets.TICKETSYSTEM_ROLE }}
          TICKETSYSTEM_SUPE_FLAG: ${{ secrets.TICKETSYSTEM_SUPE_FLAG }}
          CODESPACE_NAME: ${{ secrets.CODESPACE_NAME }}
        run: |
          {
            echo "POSTGRES_USER=$POSTGRES_USER"
            echo "POSTGRES_PASSWORD=$POSTGRES_PASSWORD"
            echo "POSTGRES_DB=$POSTGRES_DB"
            echo "DJANGO_SECRET_KEY=$DJANGO_SECRET_KEY"
            echo "TICKETSYSTEM_USERNAME=$TICKETSYSTEM_USERNAME"
            echo "TICKETSYSTEM_EMAIL=$TICKETSYSTEM_EMAIL"
            echo "TICKETSYSTEM_PASSWORD=$TICKETSYSTEM_PASSWORD"
            echo "TICKETSYSTEM_FIRST_NAME=$TICKETSYSTEM_FIRST_NAME"
            echo "TICKETSYSTEM_LAST_NAME=$TICKETSYSTEM_LAST_NAME"
            echo "TICKETSYSTEM_ROLE=$TICKETSYSTEM_ROLE"
            echo "TICKETSYSTEM_SUPE_FLAG=$TICKETSYSTEM_SUPE_FLAG"
            echo "CODESPACE_NAME=$CODESPACE_NAME"
            echo "GITHUB_CODESPACES_PORT_FORWARDING_DOMAIN=app.github.dev"
            echo "GITHUB_REPOSITORY=$GITHUB_REPOSITORY"
          } > deploy.env

      - name: Copy deploy.env to codespace and redeploy
        env:
          GH_TOKEN: ${{ secrets.CODESPACE_PAT }}
          CODESPACE_NAME: ${{ secrets.CODESPACE_NAME }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          gh codespace cp -e -c "$CODESPACE_NAME" deploy.env "remote:/workspaces/$REPO_NAME/.env"

          gh codespace ssh -c "$CODESPACE_NAME" -- "
            cd /workspaces/$REPO_NAME &&
            docker compose pull &&
            docker compose up -d --force-recreate --pull always
          "
